<style>
*{box-sizing:border-box}
.stepper{padding:0 0 1rem}
.stage-nav{display:flex;gap:0;margin-bottom:1.5rem;border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden}
.snav-btn{flex:1;padding:8px 4px;font-size:11px;font-weight:500;color:var(--text-muted);background:var(--surface-1);border:none;cursor:pointer;border-right:0.5px solid var(--border);transition:background .15s,color .15s;text-align:center;line-height:1.3}
.snav-btn:last-child{border-right:none}
.snav-btn.active{background:var(--surface-2);color:var(--text-primary)}
.snav-btn .dot{width:6px;height:6px;border-radius:50%;background:var(--border-strong);margin:0 auto 4px;transition:background .15s}
.snav-btn.active .dot{background:var(--text-accent)}
.snav-btn.done .dot{background:var(--text-success)}
.panel{display:none}
.panel.active{display:block}
.panel-header{display:flex;align-items:flex-start;gap:14px;margin-bottom:1.25rem}
.stage-badge{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0;margin-top:2px}
.panel-title{font-size:16px;font-weight:500;color:var(--text-primary);margin:0 0 4px}
.panel-sub{font-size:13px;color:var(--text-secondary);margin:0;line-height:1.5}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.25rem}
.info-card{background:var(--surface-1);border-radius:var(--radius);padding:12px 14px;border:0.5px solid var(--border)}
.ic-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;font-weight:500}
.ic-value{font-size:13px;color:var(--text-primary);line-height:1.5}
.ic-mono{font-family:var(--font-mono);font-size:12px;color:var(--text-accent)}
.output-row{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg-success);border:0.5px solid var(--border-success);border-radius:var(--radius);margin-bottom:1rem;font-size:13px;color:var(--text-success)}
.warn-row{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg-warning);border:0.5px solid var(--border-warning);border-radius:var(--radius);margin-bottom:1rem;font-size:13px;color:var(--text-warning)}
.nav-btns{display:flex;gap:8px;margin-top:1rem}
.nav-btn{padding:8px 18px;border:0.5px solid var(--border-strong);border-radius:var(--radius);background:var(--surface-2);color:var(--text-primary);font-size:13px;cursor:pointer}
.nav-btn:hover{background:var(--surface-1)}
.ask-btn{padding:8px 18px;border:0.5px solid var(--border-strong);border-radius:var(--radius);background:var(--surface-2);color:var(--text-primary);font-size:13px;cursor:pointer;margin-left:auto}
.ask-btn:hover{background:var(--surface-1)}
.tag{display:inline-block;font-size:11px;padding:2px 7px;border-radius:4px;background:var(--surface-0);border:0.5px solid var(--border);color:var(--text-secondary);margin:2px 2px 0 0}
</style>

<h2 class="sr-only">Crack detection pipeline stepper — 7 stages from data annotation to API 570/579 alert</h2>

<div class="stepper">
<div class="stage-nav" id="snav"></div>
<div id="panels"></div>
</div>

<script>
const stages=[
{id:0,label:"Data",title:"Data collection and annotation",sub:"Annotate once as Instance Segmentation (polygons) in Roboflow project 'Crack'. All downstream label types are derived from these polygons — no re-annotation needed.",badge:"Data prep",badgeColor:"background:var(--bg-accent);color:var(--text-accent)",
infos:[
{label:"Annotation tool",value:"Roboflow → Instance Segmentation → Polygons",mono:false},
{label:"Classes",value:"crack · rebar · spall  (3 classes, not 4)",mono:true},
{label:"Hard negatives to include",value:"Rust patches, weld seams, paint cracks, scratches — anything that mimics cracks visually",mono:false},
{label:"Dataset path",value:"/vishnu/dvc-mlflow-pipeline/data/raw/crack-1-1",mono:true}
],
output:"Polygon-annotated dataset with 3 clean class labels in Roboflow",
warn:null,
ask:"How many images do I need for a crack detection dataset in oil and gas?"},

{id:1,label:"Labels",title:"Label derivation from polygons",sub:"One annotation set, three label formats derived automatically. No manual re-labelling. A script converts polygons → bboxes for RF-DETR, masks for segmentation, and frame flags for the classifier.",badge:"Pre-processing",badgeColor:"background:var(--bg-accent);color:var(--text-accent)",
infos:[
{label:"Frame labels (Stage 1)",value:"crack_present = 1 if any polygon exists in frame, else 0",mono:false},
{label:"Bbox labels (Stage 2 RF-DETR)",value:"polygon extent → axis-aligned bounding box per instance",mono:false},
{label:"Pixel masks (Stage 3)",value:"Original polygon rasterized to binary mask at training resolution",mono:false},
{label:"Script",value:"yolo_to_coco.py (polygon→bbox already built from spill pipeline)",mono:true}
],
output:"Three parallel label sets from a single source — frame CSVs, COCO bbox JSON, and mask PNGs",
warn:null,
ask:"Show me the script that derives bbox and frame labels from Roboflow polygon exports"},

{id:2,label:"Stage 1",title:"CNN classifier gate",sub:"Lightweight binary classifier runs on every incoming frame. Frames with no crack signal are dropped before reaching the expensive detector. This is your main throughput lever on Jetson.",badge:"Stage 1",badgeColor:"background:var(--bg-pro);color:var(--text-pro)",
infos:[
{label:"Model options",value:"MobileNetV3-Small (recommended) · ResNet18",mono:false},
{label:"Input",value:"Full frame at 224×224 — no crop",mono:true},
{label:"Loss",value:"Binary cross-entropy · label smoothing 0.1",mono:false},
{label:"Threshold",value:"P(crack) > 0.4 → pass to Stage 2  (tune on val set recall)",mono:true}
],
output:"Binary gate decision: PASS (has crack) or DROP (no crack). Typical gate kills 60–80% of frames on sparse pipelines.",
warn:"Keep false negative rate < 2% — a missed crack costs more than a false alarm. Lower the threshold if recall is low.",
ask:"What training config should I use for the MobileNetV3 classifier gate?"},

{id:3,label:"Stage 2",title:"RF-DETR detection",sub:"Your current RF-DETR run (crack-13). Localizes crack, rebar, and spall instances as bounding boxes on frames that passed Stage 1. Provides crop regions for the segmentation stage.",badge:"Stage 2",badgeColor:"background:var(--bg-pro);color:var(--text-pro)",
infos:[
{label:"Model",value:"RFDETRBase — dinov2_windowed_small encoder",mono:true},
{label:"Resolution",value:"560px · multi_scale: true · expanded_scales: true",mono:true},
{label:"Key config (fixed)",value:"num_classes: 3 · class_names: [crack, rebar, spall]",mono:true},
{label:"Metrics to track",value:"mAP@50 per class (crack AP must be logged separately)",mono:false}
],
output:"Bounding box coordinates + class + confidence per detection. Crack boxes are cropped and passed to Stage 3.",
warn:"Config fix required: class_names had 'crack' twice and dataset_dir pointed to /vivek/. Fix both before training.",
ask:"Show me the corrected training_config.json with all fixes applied"},

{id:4,label:"Stage 3",title:"Segmentation",sub:"Pixel-level crack mask generation on each cropped region from Stage 2. This is the only stage that can physically measure crack width and length for API 570/579 compliance.",badge:"Stage 3",badgeColor:"background:var(--bg-pro);color:var(--text-pro)",
infos:[
{label:"Model options",value:"U-Net (baseline) · DeepLabV3+ · CrackFormer (best thin-crack recall)",mono:false},
{label:"Loss",value:"Dice + BCE combined — essential for class imbalance on hairline cracks",mono:true},
{label:"Input",value:"Cropped ROI from Stage 2 bbox, resized to 256×256 or 512×512",mono:true},
{label:"Augmentation",value:"Elastic distortion · random rotation · brightness/contrast jitter",mono:false}
],
output:"Binary mask per crop — crack pixels = 1, background = 0. Feeds directly into geometry extraction.",
warn:null,
ask:"How do I implement Dice + BCE combined loss for crack segmentation in PyTorch?"},

{id:5,label:"Geometry",title:"Post-processing and geometry extraction",sub:"Skeletonize the segmentation mask to extract the crack centerline, then measure width at perpendicular intervals and total path length. This is what feeds the severity decision.",badge:"Post-proc",badgeColor:"background:var(--bg-warning);color:var(--text-warning)",
infos:[
{label:"Skeletonization",value:"skimage.morphology.skeletonize — reduces mask to 1px centerline",mono:true},
{label:"Width measurement",value:"Distance transform: max distance from centerline to mask edge × 2",mono:false},
{label:"Length measurement",value:"Sum of skeleton pixel distances along path",mono:true},
{label:"Eccentricity check",value:"cv2.connectedComponentsWithStats — reject circular blobs (not cracks)",mono:true}
],
output:"Per-crack: width_mm, length_mm, path_coords, aspect_ratio, orientation_angle",
warn:"Width and length are surface measurements only — depth is not measurable from 2D images. Document this limitation explicitly in your output schema.",
ask:"Write the geometry extraction script that takes a segmentation mask and returns crack width, length, and skeleton path"},

{id:6,label:"Report",title:"API 570/579 severity and alerting",sub:"Map extracted geometry to API 570/579 fitness-for-service thresholds. Generate per-detection severity labels, log to MLflow, and fire alerts via your standard Slack/email/SMS stack with cooldown.",badge:"Output",badgeColor:"background:var(--bg-danger);color:var(--text-danger)",
infos:[
{label:"Severity levels",value:"Level 1: monitor · Level 2: schedule repair · Level 3: immediate action",mono:false},
{label:"Threshold example",value:"width > 0.5mm or length > 50mm → Level 2 (tune per client spec)",mono:true},
{label:"Logging",value:"MLflow: log width, length, confidence, severity, frame_id per detection",mono:true},
{label:"VLM verification",value:"Qwen3-VL-2B lazy-loaded for Level 2/3 — confirm before firing alert",mono:false}
],
output:"Severity-tagged detections in MLflow · Slack/email/SMS alerts with cooldown dedup · per-run DVC snapshot",
warn:null,
ask:"Write the API 570 severity mapping function that takes crack geometry and returns a severity level with recommended action"}
];

const nav=document.getElementById('snav');
const panels=document.getElementById('panels');
let current=0;

stages.forEach((s,i)=>{
const btn=document.createElement('button');
btn.className='snav-btn'+(i===0?' active done':'');
btn.innerHTML=`<div class="dot"></div>${s.label}`;
btn.onclick=()=>go(i);
nav.appendChild(btn);

const p=document.createElement('div');
p.className='panel'+(i===0?' active':'');
p.innerHTML=`
<div class="panel-header">
  <span class="stage-badge" style="${s.badgeColor}">${s.badge}</span>
  <div><p class="panel-title">${s.title}</p><p class="panel-sub">${s.sub}</p></div>
</div>
${s.warn?`<div class="warn-row"><i class="ti ti-alert-triangle" aria-hidden="true" style="font-size:16px;flex-shrink:0"></i>${s.warn}</div>`:''}
<div class="info-grid">
${s.infos.map(ic=>`<div class="info-card"><div class="ic-label">${ic.label}</div><div class="${ic.mono?'ic-mono':'ic-value'}">${ic.value}</div></div>`).join('')}
</div>
<div class="output-row"><i class="ti ti-arrow-right" aria-hidden="true" style="font-size:16px;flex-shrink:0"></i>${s.output}</div>
<div class="nav-btns">
${i>0?`<button class="nav-btn" onclick="go(${i-1})">← Back</button>`:''}
${i<stages.length-1?`<button class="nav-btn" onclick="go(${i+1})">Next →</button>`:''}
<button class="ask-btn" onclick="sendPrompt('${s.ask}')">Ask about this stage ↗</button>
</div>`;
panels.appendChild(p);
});

function go(idx){
current=idx;
document.querySelectorAll('.panel').forEach((p,i)=>p.classList.toggle('active',i===idx));
document.querySelectorAll('.snav-btn').forEach((b,i)=>{
b.classList.toggle('active',i===idx);
b.classList.toggle('done',i<idx);
});
}
</script>

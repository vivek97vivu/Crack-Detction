pipeline:
  px_to_mm: 0.15 # legacy, keep for backwards compatibility if needed
  alerts_log: "log/alerts.log"
  fallback_to_heuristic: true
  save_snapshots: true
  alerts_json_dir: "alerts/json"
  alerts_snapshot_dir: "alerts/snapshot"
  min_consecutive_frames: 4
  force_split_segmentation: false # If true, forces the pipeline to run the separate U-Net segmenter instead of using the detector's masks
  enable_detection: true
  enable_segmentation: true
  enable_gate: false

gate:
  checkpoint: null
  threshold: 0.5
  input_size: [224, 224]

detector:
  # Native TRT engine (fastest — pre-compiled FP16, instant startup, no ORT overhead)
  # To use ONNX via ORT: change to "model/rfdetr-seg-medium.onnx"
  # To use PyTorch (CPU): change to "model/seg.pth"
  checkpoint_ema: "model/rfdetr-seg-medium-fp16.engine"
  threshold: 0.5
  input_size: [576, 576]  # Must match engine export shape
  target_classes: ["crack", "rebar", "spall"]

segmenter:
  checkpoint: null 
  input_size: [256, 256]
  fallback_to_heuristic: true

geometry:
  pixel_per_mm: 10.0
  min_length_px: 20
  min_area_px: 50
  sample_interval: 5
  min_eccentricity: 0.6 # legacy

severity:
  level_1:
    max_width_mm: 0.2
    max_length_mm: 20.0
    action: "Monitor and log during routine checkups"
    reinspection_days: 180
  level_2:
    max_width_mm: 0.5
    max_length_mm: 50.0
    action: "Schedule repair/maintenance within 30 days"
    reinspection_days: 30
  level_3:
    action: "emergency maintenance"
    reinspection_days: 0

alerting: # legacy alerting config
  cooldowns:
    2: 7200
    3: 600


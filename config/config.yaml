detector:
  checkpoint_ema: model/rfdetr-seg-medium-fp16.engine
  input_size:
  - 576
  - 576
  target_classes:
  - crack
  - rebar
  - spall
  threshold: 0.5
gate:
  checkpoint: null
  input_size:
  - 224
  - 224
  threshold: 0.35
geometry:
  min_area_px: 50
  min_eccentricity: 0.6
  min_length_px: 20
  pixel_per_mm: 10.0
  sample_interval: 5
pipeline:
  alerts_json_dir: alerts/json
  alerts_log: log/alerts.log
  alerts_snapshot_dir: alerts/snapshot
  enable_detection: true
  enable_gate: true
  enable_segmentation: true
  fallback_to_heuristic: true
  force_split_segmentation: false
  min_consecutive_frames: 4
  pool_workers: 4
  px_to_mm: 0.15
  save_snapshots: true
segmenter:
  checkpoint: null
  fallback_to_heuristic: true
  input_size:
  - 256
  - 256
severity:
  level_1:
    action: Monitor and log during routine checkups
    max_length_mm: 20.0
    max_width_mm: 0.2
    reinspection_days: 180
  level_2:
    action: Schedule repair/maintenance within 30 days
    max_length_mm: 50.0
    max_width_mm: 0.5
    reinspection_days: 30
  level_3:
    action: emergency maintenance
    reinspection_days: 0
